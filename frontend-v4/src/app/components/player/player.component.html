<app-details

    [downloadProgress]="retrievalService.downloadProgress()"
    [title]="retrievalService.title()"
    [author]="retrievalService.author()"

></app-details>

<app-primary

    [repeatEnabled]="mediaContextService.repeatEnabled()"
></app-primary>
