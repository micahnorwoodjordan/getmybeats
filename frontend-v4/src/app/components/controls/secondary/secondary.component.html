<div class="secondary-controls">
    <a [href]="userExperienceReportUrl" target="_blank" rel="noopener">
        <mat-icon class="icon" matTooltip="view user experience report">description</mat-icon>
    </a>

    <mat-icon class="icon" (click)="openBottomSheet()" matTooltip="select a song" [class.disabled]="isLoading">menu</mat-icon>
    <mat-icon class="icon" (click)="openVolumeSnackBar()" matTooltip="adjust audio volume">volume_up</mat-icon>
</div>
